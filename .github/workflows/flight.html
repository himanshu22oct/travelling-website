    <!-- Flight Booking Form -->
    <section class="flight-booking">
        <p class="para">Book Your Flight Ticket</p>
        <form id="flightBookingForm">
            <label for="departureAirport">Departure Airport:</label>
            <select id="departureAirport" required>
                <option value="">Select Departure Airport</option>
                <option value="Delhi (DEL)">Delhi (DEL)</option>
                <option value="Mumbai (BOM)">Mumbai (BOM)</option>
                <option value="Bangalore (BLR)">Bangalore (BLR)</option>
                <option value="Chennai (MAA)">Chennai (MAA)</option>
                <option value="Kolkata (CCU)">Kolkata (CCU)</option>
            </select>

            <label for="destinationAirport">Destination Airport:</label>
            <select id="destinationAirport" required>
                <option value="">Select Destination Airport</option>
                <option value="Delhi (DEL)">Delhi (DEL)</option>
                <option value="Mumbai (BOM)">Mumbai (BOM)</option>
                <option value="Bangalore (BLR)">Bangalore (BLR)</option>
                <option value="Chennai (MAA)">Chennai (MAA)</option>
                <option value="Kolkata (CCU)">Kolkata (CCU)</option>
            </select>

            <label for="travelDate">Travel Date:</label>
            <input type="date" id="travelDate" required>

            <label for="flightType">Flight Type:</label>
            <select id="flightType" required>
                <option value="">Select Flight Type</option>
                <option value="Domestic">Domestic</option>
                <option value="International">International</option>
                <option value="Direct">Direct</option>
                <option value="Connecting">Connecting</option>
            </select>

            <label for="classType">Class Type:</label>
            <select id="classType" required>
                <option value="">Select Class</option>
                <option value="Economy">Economy - ₹5/km</option>
                <option value="Business">Business - ₹10/km</option>
                <option value="First-Class">First-Class - ₹15/km</option>
            </select>

            <button type="button" onclick="calculateFlightFare()">Calculate Fare</button>

            <p id="estimatedFlightFare"></p>

            <label for="payment">Payment Method:</label>
            <select id="payment" required onchange="showPaymentFields()">
                <option value="">Select Payment Method</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="UPI">UPI</option>
                <option value="Net Banking">Net Banking</option>
            </select>

            <!-- Credit/Debit Card Payment -->
            <div id="cardDetails" style="display: none;">
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" placeholder="Enter Card Number">
                <label for="cardExpiry">Expiry Date:</label>
                <input type="month" id="cardExpiry">
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" placeholder="123">
            </div>

            <!-- UPI Payment -->
            <div id="upiDetails" style="display: none;">
                <label for="upiID">UPI ID:</label>
                <input type="text" id="upiID" placeholder="example@upi">
            </div>

            <!-- Net Banking Payment -->
            <div id="netBankingDetails" style="display: none;">
                <label for="bankName">Select Bank:</label>
                <select id="bankName">
                    <option value="">Choose Bank</option>
                    <option value="SBI">State Bank of India</option>
                    <option value="HDFC">HDFC Bank</option>
                    <option value="ICICI">ICICI Bank</option>
                    <option value="Axis">Axis Bank</option>
                </select>
            </div>

            <button type="submit">Confirm Booking</button>
        </form>
        <p id="bookingMessage"></p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Travel Explorer. Discover Your Next Adventure!</p>
    </footer>

    <script>
        function calculateFlightFare() {
            const departure = document.getElementById("departureAirport").value;
            const destination = document.getElementById("destinationAirport").value;
            const classType = document.getElementById("classType").value;

            if (!departure || !destination || !classType) {
                alert("Please select all fields to calculate fare.");
                return;
            }

            const distance = Math.floor(Math.random() * (5000 - 500 + 1)) + 500; // Random distance 500-5000km
            let ratePerKm = { "Economy": 5, "Business": 10, "First-Class": 15 }[classType];

            const fare = distance * ratePerKm;
            document.getElementById("estimatedFlightFare").innerText = `Estimated Fare: ₹${fare} (Distance: ${distance} km)`;
        }

        function showPaymentFields() {
            let paymentMethod = document.getElementById("payment").value;
            document.getElementById("cardDetails").style.display = paymentMethod.includes("Card") ? "block" : "none";
            document.getElementById("upiDetails").style.display = paymentMethod === "UPI" ? "block" : "none";
            document.getElementById("netBankingDetails").style.display = paymentMethod === "Net Banking" ? "block" : "none";
        }

        document.getElementById("flightBookingForm").addEventListener("submit", function(event) {
            event.preventDefault();
            if (!document.getElementById("payment").value) {
                alert("Please select a payment method.");
                return;
            }
            document.getElementById("bookingMessage").innerText = "Booking successful! Your flight ticket has been confirmed.";
        });
    </script>
