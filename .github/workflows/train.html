    <!-- Train Booking Form -->
    <section class="train-booking">
        <p class="para">Book Your Train Ticket</p>
        <form id="trainBookingForm">
            <label for="departureStation">Departure Station:</label>
            <select id="departureStation" required>
                <option value="">Select Departure Station</option>
                <option value="Delhi">Delhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Bangalore">Bangalore</option>
                <option value="Chennai">Chennai</option>
                <option value="Kolkata">Kolkata</option>
            </select>

            <label for="destinationStation">Destination Station:</label>
            <select id="destinationStation" required>
                <option value="">Select Destination Station</option>
                <option value="Delhi">Delhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Bangalore">Bangalore</option>
                <option value="Chennai">Chennai</option>
                <option value="Kolkata">Kolkata</option>
            </select>

            <label for="travelDate">Travel Date:</label>
            <input type="date" id="travelDate" required>

            <label for="trainType">Train Type:</label>
            <select id="trainType" required>
                <option value="">Select Train Type</option>
                <option value="Express">Express</option>
                <option value="Superfast">Superfast</option>
                <option value="Rajdhani">Rajdhani</option>
                <option value="Shatabdi">Shatabdi</option>
                <option value="Duronto">Duronto</option>
            </select>

            <label for="classType">Class Type:</label>
            <select id="classType" required>
                <option value="">Select Class</option>
                <option value="General">General - ₹1/km</option>
                <option value="Sleeper">Sleeper - ₹2/km</option>
                <option value="3AC">3AC - ₹3/km</option>
                <option value="2AC">2AC - ₹4/km</option>
                <option value="1AC">1AC - ₹5/km</option>
            </select>

            <button type="button" onclick="calculateTrainFare()">Calculate Fare</button>

            <p id="estimatedTrainFare"></p>

            <label for="payment">Payment Method:</label>
            <select id="payment" required onchange="showPaymentFields()">
                <option value="">Select Payment Method</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="UPI">UPI</option>
                <option value="Net Banking">Net Banking</option>
            </select>

            <!-- Credit/Debit Card Payment -->
            <div id="cardDetails" style="display: none;">
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" placeholder="Enter Card Number">
                <label for="cardExpiry">Expiry Date:</label>
                <input type="month" id="cardExpiry">
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" placeholder="123">
            </div>

            <!-- UPI Payment -->
            <div id="upiDetails" style="display: none;">
                <label for="upiID">UPI ID:</label>
                <input type="text" id="upiID" placeholder="example@upi">
            </div>

            <!-- Net Banking Payment -->
            <div id="netBankingDetails" style="display: none;">
                <label for="bankName">Select Bank:</label>
                <select id="bankName">
                    <option value="">Choose Bank</option>
                    <option value="SBI">State Bank of India</option>
                    <option value="HDFC">HDFC Bank</option>
                    <option value="ICICI">ICICI Bank</option>
                    <option value="Axis">Axis Bank</option>
                </select>
            </div>

            <button type="submit">Confirm Booking</button>
        </form>
        <p id="bookingMessage"></p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Travel Explorer. Discover Your Next Adventure!</p>
    </footer>

    <script>
        function calculateTrainFare() {
            const departure = document.getElementById("departureStation").value;
            const destination = document.getElementById("destinationStation").value;
            const classType = document.getElementById("classType").value;

            if (!departure || !destination || !classType) {
                alert("Please select all fields to calculate fare.");
                return;
            }

            const distance = Math.floor(Math.random() * (1000 - 100 + 1)) + 100; // Random distance 100-1000km
            let ratePerKm = { "General": 1, "Sleeper": 2, "3AC": 3, "2AC": 4, "1AC": 5 }[classType];

            const fare = distance * ratePerKm;
            document.getElementById("estimatedTrainFare").innerText = `Estimated Fare: ₹${fare} (Distance: ${distance} km)`;
        }

        function showPaymentFields() {
            let paymentMethod = document.getElementById("payment").value;
            document.getElementById("cardDetails").style.display = paymentMethod.includes("Card") ? "block" : "none";
            document.getElementById("upiDetails").style.display = paymentMethod === "UPI" ? "block" : "none";
            document.getElementById("netBankingDetails").style.display = paymentMethod === "Net Banking" ? "block" : "none";
        }

        document.getElementById("trainBookingForm").addEventListener("submit", function(event) {
            event.preventDefault();
            if (!document.getElementById("payment").value) {
                alert("Please select a payment method.");
                return;
            }
            document.getElementById("bookingMessage").innerText = "Booking successful! Your train ticket has been confirmed.";
        });
    </script>
