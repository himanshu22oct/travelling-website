    <!-- Home Stay Listings -->
    <section class="homestay-listings">
        <p class="para">Explore Our Best Home Stays</p>
        <div class="homestay-container" id="homestayContainer"></div>
    </section>

    <!-- Booking Form -->
    <section class="homestay-booking">
        <p class="para">Book Your Stay</p>
        <form id="bookingForm">
            <label for="selectedHomestay">Selected Home Stay:</label>
            <input type="text" id="selectedHomestay" readonly>

            <label for="checkInDate">Check-In Date:</label>
            <input type="date" id="checkInDate" required>

            <label for="checkOutDate">Check-Out Date:</label>
            <input type="date" id="checkOutDate" required>

            <label for="guests">Number of Guests:</label>
            <input type="number" id="guests" min="1" value="1" required>

            <button type="button" onclick="calculateTotal()">Calculate Price</button>
            <p id="totalPrice"></p>

            <label for="payment">Payment Method:</label>
            <select id="payment" required onchange="showPaymentFields()">
                <option value="">Select Payment Method</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="UPI">UPI</option>
                <option value="Net Banking">Net Banking</option>
            </select>

            <div id="paymentDetails"></div>

            <button type="submit">Confirm Booking</button>
        </form>
        <p id="bookingMessage"></p>
    </section>

    <footer>
        <p>&copy; 2025 Travel Explorer. Discover Your Next Adventure!</p>
    </footer>
